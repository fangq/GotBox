name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-15-intel (not macos-latest/arm64): the official FPC 3.2.2 macOS
        # packages are x86_64 and their installers cap the supported macOS
        # version, so they fail on the newest arm64 images. An Intel runner with
        # an in-range OS installs them cleanly.
        os: [ubuntu-latest, windows-latest, macos-15-intel]
    steps:
      - uses: actions/checkout@v5

      # Linux/Windows: action installs FPC + Lazarus (LCL) and puts the tools on PATH
      - name: Install Lazarus + FPC
        if: runner.os != 'macOS'
        uses: gcarreno/setup-lazarus@v3.4.1
        with:
          lazarus-version: stable

      # macOS: install from the official SourceForge .dmg/.pkg downloads instead
      - name: Install Lazarus + FPC (macOS)
        if: runner.os == 'macOS'
        uses: ./.github/actions/install-lazarus-macos

      - name: Tool versions
        shell: bash
        run: |
          fpc -iV
          lazbuild --version
          git --version

      # generated from gotbox.rc so a fresh checkout builds (see Makefile)
      - name: Generate project resource
        shell: bash
        run: fpcres -of res -o gotbox.res gotbox.rc

      # compiles gboxfilewatcher with this OS's native backend
      # (inotify / ReadDirectoryChangesW / FSEvents); Release mode also exercises
      # the optimized + smart-linked + stripped build path
      - name: Build GUI app
        shell: bash
        run: lazbuild --build-mode=Release gotbox.lpi

      # builds + runs the console suite; each test is run under a hard timeout
      - name: Build & run tests
        shell: bash
        run: tests/run.sh

  # Verify the project still compiles on the older Lazarus that ships with
  # Ubuntu 22.04 (Lazarus 2.2 / FPC 3.2.x) via apt -- covers Lazarus 2.x users.
  compat-lazarus2:
    name: compat (ubuntu 22.04 / lazarus 2.2)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - name: Install Lazarus 2.2 + FPC (jammy apt)
        run: |
          sudo apt-get update
          # full install (recommends bring the FCL unit packages LCL needs, e.g.
          # fasthtmlparser); apt's Lazarus ships LCL as source, so lazbuild has
          # to compile it -- chown the dir so the build user can write there.
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y lazarus
          sudo chown -R "$(id -u):$(id -g)" /usr/lib/lazarus
          fpc -iV
          lazbuild --version | tail -1
      - name: Generate project resource
        run: fpcres -of res -o gotbox.res gotbox.rc
      # default (debug) mode -- only checking the sources compile on Lazarus 2.x
      - name: Build GUI app
        run: lazbuild gotbox.lpi
      - name: Build & run tests
        run: tests/run.sh

  format:
    name: format check (jcf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Lazarus + FPC
        uses: gcarreno/setup-lazarus@v3.4.1
        with:
          lazarus-version: stable
      # best-effort: JCF is built from the Lazarus component sources, whose path
      # varies by installer; don't fail the workflow if it can't be located.
      - name: Build JCF formatter
        continue-on-error: true
        run: tools/install-jcf.sh
      - name: Check formatting
        continue-on-error: true
        run: make format-check
