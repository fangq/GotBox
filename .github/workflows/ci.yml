name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      # installs FPC + Lazarus (LCL) and puts fpc/lazbuild/fpcres on PATH
      - name: Install Lazarus + FPC
        uses: gcarreno/setup-lazarus@v3.4.1
        with:
          lazarus-version: stable

      - name: Tool versions
        shell: bash
        run: |
          fpc -iV
          lazbuild --version
          git --version

      # generated from gotbox.rc so a fresh checkout builds (see Makefile)
      - name: Generate project resource
        shell: bash
        run: fpcres -of res -o gotbox.res gotbox.rc

      # compiles gboxfilewatcher with this OS's native backend
      # (inotify / ReadDirectoryChangesW / FSEvents); Release mode also exercises
      # the optimized + smart-linked + stripped build path
      - name: Build GUI app
        shell: bash
        run: lazbuild --build-mode=Release gotbox.lpi

      # builds + runs the console suite; each test is run under a hard timeout
      - name: Build & run tests
        shell: bash
        run: tests/run.sh

  # Verify the project still compiles on the old Lazarus/FPC that ships with
  # Ubuntu 20.04 (Lazarus 2.0.6 / FPC 3.0.4), run inside a focal container.
  compat-lazarus2:
    name: compat (ubuntu 20.04 / lazarus 2.0)
    runs-on: ubuntu-latest
    container: ubuntu:20.04
    steps:
      - name: Install Lazarus 2.0 + FPC 3.0 (focal)
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends lazarus git ca-certificates
          fpc -iV
          lazbuild --version | tail -1
      - uses: actions/checkout@v5
      - name: Generate project resource
        run: fpcres -of res -o gotbox.res gotbox.rc
      # default (debug) mode -- the Release build-mode XML may differ across
      # Lazarus versions; here we only care that the sources compile on 2.0
      - name: Build GUI app
        run: lazbuild gotbox.lpi
      - name: Build & run tests
        run: tests/run.sh

  format:
    name: format check (jcf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Lazarus + FPC
        uses: gcarreno/setup-lazarus@v3.4.1
        with:
          lazarus-version: stable
      # best-effort: JCF is built from the Lazarus component sources, whose path
      # varies by installer; don't fail the workflow if it can't be located.
      - name: Build JCF formatter
        continue-on-error: true
        run: tools/install-jcf.sh
      - name: Check formatting
        continue-on-error: true
        run: make format-check
