name: Package

# Builds the desktop installers and uploads them as workflow artifacts:
#   Linux   -> .deb         (GUI gotbox + headless gotboxd, UPX-compressed)
#   Windows -> Inno Setup .exe (UPX-compressed; unsigned -- see the README for
#              how to allow it to run past SmartScreen) + portable .zip
#   macOS   -> .dmg         (GotBox.app with gotbox + gotboxd; no UPX)
# Runs on main and on version tags; also on demand. Tag pushes (v*) additionally
# attach the installers to a GitHub Release.
#
# gotboxd is the headless daemon (no GUI/X): it runs the sync engine on servers
# or over plain SSH where the GUI can't open a display.

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

# needed for the tag-only "attach to release" steps (softprops/action-gh-release)
permissions:
  contents: write

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------ Linux .deb
  linux-deb:
    name: linux (.deb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Lazarus + FPC
        uses: gcarreno/setup-lazarus@v3.4.1
        with:
          lazarus-version: stable

      - name: Install UPX
        run: sudo apt-get update && sudo apt-get install -y upx-ucl

      - name: Generate project resource
        run: fpcres -of res -o gotbox.res gotbox.rc

      - name: Build GUI app (Release)
        run: lazbuild --build-mode=Release gotbox.lpi

      - name: Build headless daemon (gotboxd)
        run: make gotboxd

      - name: Compute version
        run: |
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            ver="${GITHUB_REF#refs/tags/v}"
          else
            ver="0.5.0~git$(git rev-parse --short HEAD)"
          fi
          echo "VERSION=$ver" >> "$GITHUB_ENV"
          echo "building version $ver"

      - name: Compress binaries (UPX)
        run: |
          upx --best --lzma gotbox gotboxd
          upx -t gotbox
          upx -t gotboxd

      - name: Build .deb
        run: |
          set -eu
          arch=amd64
          pkg="build/deb/gotbox_${VERSION}_${arch}"
          rm -rf "$pkg"
          mkdir -p "$pkg/DEBIAN" "$pkg/usr/bin" \
                   "$pkg/usr/share/applications" "$pkg/etc/xdg/autostart" \
                   "$pkg/usr/share/doc/gotbox"
          install -m 0755 gotbox "$pkg/usr/bin/gotbox"
          install -m 0755 gotboxd "$pkg/usr/bin/gotboxd"
          install -m 0644 packaging/linux/gotbox.desktop \
                  "$pkg/usr/share/applications/gotbox.desktop"
          install -m 0644 packaging/linux/gotbox-autostart.desktop \
                  "$pkg/etc/xdg/autostart/gotbox.desktop"
          install -m 0644 README.md "$pkg/usr/share/doc/gotbox/README.md"
          # control: fields at column 0, Description continuation lines prefixed
          # with a single space (built with echo so YAML indentation can't corrupt it)
          {
            echo "Package: gotbox"
            echo "Version: ${VERSION}"
            echo "Section: utils"
            echo "Priority: optional"
            echo "Architecture: ${arch}"
            echo "Depends: git, libgtk2.0-0, libx11-6, libc6"
            echo "Recommends: libsecret-tools, git-lfs"
            echo "Maintainer: Qianqian Fang <q.fang@northeastern.edu>"
            echo "Homepage: https://github.com/fangq/GotBox"
            echo "Description: Dropbox-like file sync over GitHub private repos"
            echo " GotBox gives an edit-locally, auto-sync-everywhere experience"
            echo " backed by GitHub private repos instead of a proprietary cloud."
            echo " It watches a root folder, auto-commits and pushes changes,"
            echo " periodically pulls remote changes, and lives in the system tray."
            echo " A headless 'gotboxd' is also installed for servers or SSH"
            echo " sessions where no X display is available."
          } > "$pkg/DEBIAN/control"
          mkdir -p dist
          dpkg-deb --build --root-owner-group "$pkg" \
                   "dist/gotbox_${VERSION}_${arch}.deb"
          ls -lh dist

      - uses: actions/upload-artifact@v4
        with:
          name: gotbox-linux-deb
          path: dist/*.deb
          if-no-files-found: error

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb

  # -------------------------------------------------------------- Windows (Inno)
  windows-inno:
    name: windows (Inno Setup .exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Lazarus + FPC
        uses: gcarreno/setup-lazarus@v3.4.1
        with:
          lazarus-version: stable

      - name: Generate project resource
        shell: bash
        run: fpcres -of res -o gotbox.res gotbox.rc

      - name: Build GUI app (Release)
        shell: bash
        run: lazbuild --build-mode=Release gotbox.lpi

      - name: Build headless daemon (gotboxd.exe)
        shell: bash
        run: |
          mkdir -p lib/gotboxd
          fpc -O2 -Fusrc/core -FUlib/gotboxd -ogotboxd.exe gotboxd.lpr

      - name: Install UPX
        shell: pwsh
        run: choco install upx -y --no-progress

      # Shrinks the download. NOTE: run UPX BEFORE any future code-signing step
      # (packing rewrites the PE and would void a signature). Unsigned + UPX is
      # more likely to trip SmartScreen/Defender -- the README documents how
      # users allow it to run until the app is signed.
      - name: Compress binaries (UPX)
        shell: bash
        run: |
          upx --best --lzma gotbox.exe gotboxd.exe
          upx -t gotbox.exe
          upx -t gotboxd.exe

      - name: Compute version
        shell: bash
        run: |
          # Windows installer version: keep it CLEAN (no '~' and no per-commit
          # hash). A stable "gotbox-setup-<ver>.exe" name lets the file accrue
          # Defender/SmartScreen reputation across downloads instead of looking
          # brand-new every commit (which trips ASR "block low-prevalence exe").
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            ver="${GITHUB_REF#refs/tags/v}"
          else
            ver="0.5.0"
          fi
          # numeric a.b.c.d for the PE VersionInfo (Inno requires numeric)
          vernum="$(printf '%s' "$ver" | grep -oE '^[0-9]+(\.[0-9]+)*')"
          [ -z "$vernum" ] && vernum="0.5.0"
          IFS='.' read -r a b c d <<< "$vernum"
          d="${d%%.*}"   # drop any 5th+ component (PE VersionInfo allows 4)
          vernum="${a:-1}.${b:-0}.${c:-0}.${d:-0}"
          echo "VERSION=$ver" >> "$GITHUB_ENV"
          echo "VERNUM=$vernum" >> "$GITHUB_ENV"
          echo "building version $ver (VersionInfo $vernum)"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "/DAppVersion=$env:VERSION" "/DAppVerNumeric=$env:VERNUM" `
                  "/DSrcDir=$($PWD.Path)" "packaging\windows\gotbox.iss"
          Get-ChildItem dist

      - name: Stage portable files + build .zip (for the release asset)
        shell: pwsh
        run: |
          $stage = "gotbox-$env:VERSION-win64"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item gotbox.exe, gotboxd.exe, README.md $stage
          # A real single .zip -- attached AS-IS to a release (release assets are
          # not re-wrapped), so release downloaders get one usable archive.
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "$stage\*" `
            -DestinationPath "dist\gotbox-$env:VERSION-win64.zip" -Force
          Get-ChildItem dist

      - uses: actions/upload-artifact@v4
        with:
          name: gotbox-windows-setup
          path: dist/*.exe
          if-no-files-found: error

      # Upload the STAGED FILES, not the .zip: upload-artifact always wraps its
      # contents in a zip, so uploading a .zip yields a zip-inside-a-zip. Windows
      # Explorer can't extract files out of a nested archive (error 0x80004005),
      # so hand GitHub the loose files and let it produce a single, usable zip.
      - uses: actions/upload-artifact@v4
        with:
          name: gotbox-windows-portable
          path: gotbox-*-win64/*
          if-no-files-found: error

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.zip

  # -------------------------------------------------------------------- macOS dmg
  macos-dmg:
    name: macos (.dmg)
    # Pin to macOS 14 (Sonoma): setup-lazarus' .pkg installs there, but the newer
    # macos-latest (macOS 15 / Sequoia) rejects it as "incompatible with this
    # version of macOS". macos-14 is the last image this job passed on.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Install Lazarus + FPC
        uses: gcarreno/setup-lazarus@v3.4.1
        with:
          lazarus-version: stable

      - name: Generate project resource
        run: fpcres -of res -o gotbox.res gotbox.rc

      - name: Build GUI app (Release)
        run: lazbuild --build-mode=Release gotbox.lpi

      - name: Build headless daemon (gotboxd)
        run: make gotboxd

      - name: Compute version
        run: |
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            ver="${GITHUB_REF#refs/tags/v}"
          else
            ver="0.5.0~git$(git rev-parse --short HEAD)"
          fi
          echo "VERSION=$ver" >> "$GITHUB_ENV"
          echo "building version $ver"

      - name: Build .app bundle + .dmg
        run: |
          set -eu
          # lazbuild may place the binary inside the bundle or at the repo root
          if [ -x gotbox.app/Contents/MacOS/gotbox ]; then
            bin=gotbox.app/Contents/MacOS/gotbox
          elif [ -x gotbox ]; then
            bin=gotbox
          else
            echo "no gotbox binary produced"; exit 1
          fi

          stage="$(mktemp -d)"
          app="$stage/GotBox.app"
          mkdir -p "$app/Contents/MacOS" "$app/Contents/Resources"
          cp "$bin" "$app/Contents/MacOS/gotbox"
          chmod +x "$app/Contents/MacOS/gotbox"
          # headless daemon travels inside the bundle; after drag-install it is at
          # /Applications/GotBox.app/Contents/MacOS/gotboxd (no GUI/WindowServer)
          cp gotboxd "$app/Contents/MacOS/gotboxd"
          chmod +x "$app/Contents/MacOS/gotboxd"
          sed "s/__VERSION__/${VERSION}/g" packaging/macos/Info.plist \
              > "$app/Contents/Info.plist"

          # drag-to-install layout
          ln -s /Applications "$stage/Applications"

          mkdir -p dist
          hdiutil create -volname "GotBox" -srcfolder "$stage" \
                  -ov -format UDZO "dist/GotBox-${VERSION}.dmg"
          ls -lh dist

      - uses: actions/upload-artifact@v4
        with:
          name: gotbox-macos-dmg
          path: dist/*.dmg
          if-no-files-found: error

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
